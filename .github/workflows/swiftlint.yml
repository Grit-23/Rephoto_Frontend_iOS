name: SwiftLint

on:
  pull_request:
    branches: [main]

jobs:
  swiftlint:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: '**/*.swift'

      - name: Run SwiftLint on changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | xargs swiftlint --reporter github-actions-logging
          
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Config.xcconfig placeholder
        run: |
          echo 'BASE_URL = https:/$()/placeholder.com' > Rephoto_iOS/Resource/Config.xcconfig

      - name: Build
        run: |
          xcodebuild build \
            -project Rephoto_iOS.xcodeproj \
            -scheme Rephoto_iOS \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
